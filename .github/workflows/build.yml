name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Download valid Gradle wrapper jar
        run: |
          echo "Downloading Gradle 8.4 to extract wrapper jar..."
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -o /tmp/gradle.zip -d /tmp/gradle-dist
          WRAPPER_JAR=$(find /tmp/gradle-dist -name "gradle-wrapper.jar" | head -1)
          echo "Found: $WRAPPER_JAR"
          cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: inkeepx-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
